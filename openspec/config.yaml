# Spec-Driven Development (SDD) Configuración

proyecto: kimografico-portfolio
stack:
  frontend: React 18 + TypeScript + Vite
  estilos: Tailwind CSS
  routing: React Router v6
  tabla: TanStack Table v8
  tests: Vitest + Testing Library
  datos: JSON estáticos en /data
  gestor_paquetes: pnpm
  hosting: GitHub Pages

estructura:
  specs_master: openspec/specs/
  cambios: openspec/changes/
  archivo: openspec/changes/archive/

convenciones:
  - Cada cambio relevante tiene su carpeta en openspec/changes/{change-name}/
  - specs y diseño técnico se documentan en cada cambio
  - specs master se actualizan solo al archivar cambios
  - Los nombres de cambio usan kebab-case y reflejan la fase o feature
  - El ciclo SDD es: sdd-init → sdd-explore → sdd-propose → sdd-spec → sdd-design → sdd-tasks → sdd-apply → sdd-verify → sdd-archive
  - Los comandos de frontend se ejecutan desde /frontend
  - Tests: pnpm test
  - Typecheck: pnpm typecheck
  - Build: pnpm build
  - Datos en /data/*.json
  - Imágenes en /frontend/public/images/
  - Documentar decisiones y specs en markdown
