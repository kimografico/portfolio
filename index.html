<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio de Kimo — diseñador gráfico y desarrollador de software"
    />
    <title>kimografico — diseño & desarrollo</title>

    <!-- PWA: color de la barra del navegador en Android -->
    <meta name="theme-color" content="#f4f4f2" />

    <!-- PWA: icono para la pantalla de inicio en iOS (Safari no usa el manifest) -->
    <!-- Usar favicon como fallback de prueba -->
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- PWA: comportamiento en iOS al añadir a pantalla de inicio -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="kimografico" />

    <!-- PWA: el manifest lo inyecta automáticamente vite-plugin-pwa en el build -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Workaround para GitHub Pages + SPAs
      // Si llegamos aquí desde 404.html, restaura la ruta original
      const params = new URLSearchParams(window.location.search);
      const redirectPath = params.get('redirect');
      if (redirectPath) {
        // Limpia la URL y la restaura a su forma original
        window.history.replaceState(null, null, redirectPath);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
